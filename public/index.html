<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Symphony</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:ital,wght@0,200..1000;1,200..1000&display=swap" rel="stylesheet">
  <link href="favicon.ico" rel="icon" type="image/x-icon">
  <link rel="stylesheet" href="index.css">
</head>
<body>
  <div class="CenterVert">
    <a href="../">
      <img src="HomeIcon.png" alt="Home" style="width: 50px; height: 50px;">
    </a>
    <span>&nbsp;&nbsp;</span>
    <span id="ServerName">Server</span>
    <div id="ServerList" style="display: none; margin-left: 10px;">
      <div class="ServerListServer" id="32d58460-8333-4efe-9f5a-064c273757b6">
        <span>Test Server</span>
        <button class="OpenServer" data-server-id="32d58460-8333-4efe-9f5a-064c273757b6">Open</button>
      </div>
    </div>
    <button id="OpenServersButton">&nbsp;Servers >&nbsp;</button>
  </div>
  <div class="Line"></div>
  <br>
  <div id="Messages"></div>
  <div id="ReplyingTo">
    <button id="ReplyingToCancelButton">X</button>
    <span>&nbsp;</span>
    <span id="ReplyingToText">Replying to: ___</span>
  </div>
  <textarea id="MessageInput" placeholder="Type a message..." spellcheck="true" autocorrect="off"></textarea>
  <button id="SendButton">></button>
  <div class="ContextMenu" id="ContextMenu">
    <button id="ReplyMessageButton">Reply</button>
    <!--<button id="EditMessageButton">Edit</button>-->
    <button id="CopyMessageButton">Copy text</button>
    <button id="DeleteMessageButton">Delete Message</button>
    <button id="CopyMessageIdButton">Copy message ID</button>
  </div>
  <audio id="MessageSound" src="NotificationSound.m4a"></audio>
  <script src="./main.js" type="module"></script>
</body>
</html>
