<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Symphony</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:ital,wght@0,200..1000;1,200..1000&display=swap" rel="stylesheet">
  <link href="favicon.ico" rel="icon" type="image/x-icon">
  <style>
    body {
      background-color: black;
      color: white;
      font-family: 'Nunito';
    }

    .CenterVert {
      display: flex;
      align-items: center;
    }

    #ServerName {
      font-weight: bolder;
      font-size: 42px;
    }

    .Line {
      width: calc(100% - 6px);
      height: 2px;
      background-color: #808080;
      display: block;
    }

    #MessageInput {
      width: calc(100% - 34px);
      padding: 10px;
      border-radius: 8px;
      border: none;
      outline-color: white;
      outline-style: solid;
      outline-width: 2px;
      background-color: black;
      color: white;
      font-family: 'Nunito';
      bottom: 4px;
      left: 8px;
      position: fixed;
    }

    #MessageInput:focus {
      outline-color: blue;
      outline-style: solid;
      outline-width: 2px;
    }

    .Time {
      font-size: 50%;
      font-weight: bold;
      color: #000;
      transition: color 0.3s;
    }

    #Messages {
      height: calc(100vh - 170px);
      overflow: auto;
      border: solid white 1px;
      border: none;
      padding: 0px;
    }

    .Message:hover .Time {
      color: #888;
      transition: color 0.3s;
    }

    .Message:hover {
      background-color: #111;
      transition: background-color 0.3s;
    }

    .Message {
      background-color: #000;
      transition: background-color 0.3s;
    }

    #SendButton {
      height: 34px;
      width: 34px;
      padding: 0px;
      border-radius: 8px;
      border: none;
      outline-color: white;
      outline-style: solid;
      outline-width: 2px;
      background-color: black;
      color: white;
      font-family: 'Nunito';
      bottom: 6px;
      right: 8px;
      position: fixed;
    }

    #OpenServersButton {
      height: 34px;
      /*width: 34px;*/
      border-radius: 800px;
      border: none;
      outline-style: none;
      font-size: larger;
      font-weight: bold;
      outline-color: #fff;
      outline-style: solid;
      outline-width: 1px;
      background-color: black;
      color: white;
      font-family: 'Nunito';
      transform: translateX(10px);
    }

    #SendButton:focus {
      outline-color: blue;
      outline-style: solid;
      outline-width: 2px;
    }

    #SendButton:hover {
      background-color: white;
      color: black;
    }

    #SendButton:active {
      background-color: gray;
      color: black;
    }
    
    #OpenServersButton:focus {
      outline-color: blue;
    }
    
    #OpenServersButton:hover {
      background-color: white;
      color: black;
      outline-color: black;
    }
    
    #OpenServersButton:active {
      background-color: gray;
      color: black;
    }

    #ServerList {
      background-color: #202020;
      border: solid white 1px;
      border-radius: 8px;
      padding: 10px;
      display: inline;
    }

    .OpenServer {
      height: 24px;
      width: 60px;
      border-radius: 8px;
      border: none;
      outline-color: white;
      outline-style: solid;
      outline-width: 1px;
      background-color: black;
      color: white;
      font-family: 'Nunito';
      margin-left: 7px;
    }

    .OpenServer:focus {
      outline-color: blue;
      outline-style: solid;
      outline-width: 1px;
    }

    .OpenServer:hover {
      background-color: white;
      color: black;
      outline-color: black;
    }

    .OpenServer:active {
      background-color: gray;
      color: black;
    }

    .ServerListServer {
      display: inline;
    }
  </style>
</head>
<body>
  <div class="CenterVert">
    <a href="../">
      <img src="HomeIcon.png" alt="Home" style="width: 50px; height: 50px;">
    </a>
    <span>&nbsp;&nbsp;</span>
    <span id="ServerName">Server</span>
    <div id="ServerList" style="display: none; margin-left: 10px;">
      <div class="ServerListServer" id="32d58460-8333-4efe-9f5a-064c273757b6">
        <span>Test Server</span>
        <button class="OpenServer" data-server-id="32d58460-8333-4efe-9f5a-064c273757b6">Open</button>
      </div>
    </div>
    <button id="OpenServersButton">&nbsp;Servers >&nbsp;</button>
  </div>
  <div class="Line"></div>
  <br>
  <div id="Messages"></div>
  <textarea id="MessageInput" placeholder="Type a message..." spellcheck="true"></textarea>
  <button id="SendButton">></button>
  <script src="./main.js"></script>
</body>
</html>
