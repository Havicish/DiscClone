<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Server</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:ital,wght@0,200..1000;1,200..1000&display=swap" rel="stylesheet">
  <style>
    body {
      background-color: black;
      color: white;
      font-family: 'Nunito';
    }

    .Line {
      width: calc(100% - 6px);
      height: 2px;
      background-color: #808080;
      display: block;
    }

    input {
      border-radius: 4px;
      border: none;
      outline-color: white;
      outline-style: solid;
      outline-width: 2px;
      background-color: black;
      color: white;
      font-family: 'Nunito';
    }

    input:focus {
      outline-color: blue;
      outline-style: solid;
      outline-width: 2px;
    }

    button {
      border-radius: 4px;
      border: none;
      outline-color: white;
      outline-style: solid;
      outline-width: 2px;
      background-color: black;
      color: white;
      font-family: 'Nunito';
    }

    button:focus {
      outline-color: blue;
      outline-style: solid;
      outline-width: 2px;
    }

    button:hover {
      background-color: white;
      color: black;
    }

    button:active {
      background-color: gray;
      color: black;
    }
  </style>
</head>
<body>
  <h1>Sign in</h1>
  <div class="Line"></div>
  <br>
  <label for="Username">Username:</label>
  <input id="Username">
  <br>
  <br>
  <label for="Password">Password:</label>
  <input id="Password" type="password">
  <br>
  <br>
  <button id="SignInButton">Sign in</button>
  <span>‎‎</span>
  <button id="CreateAccountButton">Create account</button>
  <script src="./sign-in-main.js"></script>
</body>
</html>
