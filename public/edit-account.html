<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Symphony</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:ital,wght@0,200..1000;1,200..1000&display=swap" rel="stylesheet">
  <link href="favicon.ico" rel="icon" type="image/x-icon">
  <style>
    body {
      background-color: black;
      color: white;
      font-family: "Nunito";
    }

    .Line {
      width: calc(100% - 6px);
      height: 2px;
      background-color: #808080;
      display: block;
    }

    #PageName {
      font-weight: bolder;
      font-size: 42px;
    }

    input {
      border-radius: 4px;
      border: none;
      outline-color: white;
      outline-style: solid;
      outline-width: 2px;
      background-color: black;
      color: white;
      font-family: "Nunito";
    }

    input:focus {
      outline-color: #ff6900;
      outline-style: solid;
      outline-width: 2px;
    }

    button {
      border-radius: 4px;
      border: none;
      outline-color: white;
      outline-style: solid;
      outline-width: 2px;
      background-color: black;
      color: white;
      font-family: "Nunito";
    }

    button:focus {
      outline-color: #ff6900;
      outline-style: solid;
      outline-width: 2px;
    }

    button:hover {
      background-color: white;
      color: black;
    }

    button:active {
      background-color: gray;
      color: black;
    }

    .CenterVert {
      display: flex;
      align-items: center;
    }
  </style>
</head>
<body>
  <div class="TopBar">
    <div class="CenterVert">
      <span id="PageName">Your account</span>
    </div>
  </div>
  <div class="Line"></div>
  <br>
  <div>
    <label for="UsernameColor">Change username color:</label>
    <input type="color" value="#fffffe" id="UsernameColor">
  </div>
  <br>
  <button id="CancelChangesButton">Cancel changes</button>
  <span>&nbsp;</span>
  <button id="SaveChangesButton">Save changes</button>
  <script src="edit-account-main.js"></script>
</body>
</html>
