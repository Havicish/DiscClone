<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Server</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:ital,wght@0,200..1000;1,200..1000&display=swap" rel="stylesheet">
  <style>
    body {
      background-color: black;
      color: white;
      font-family: 'Nunito';
    }

    .CenterVert {
      display: flex;
      align-items: center;
    }

    #ServerName {
      font-weight: bolder;
      font-size: 42px;
    }

    .Line {
      width: calc(100% - 6px);
      height: 2px;
      background-color: #808080;
      display: block;
    }

    #MessageInput {
      width: calc(100% - 34px);
      padding: 10px;
      border-radius: 8px;
      border: none;
      outline-color: white;
      outline-style: solid;
      outline-width: 2px;
      background-color: black;
      color: white;
      font-family: 'Nunito';
      bottom: 4px;
      left: 8px;
      position: fixed;
    }

    #MessageInput:focus {
      outline-color: blue;
      outline-style: solid;
      outline-width: 2px;
    }

    .Time {
      font-size: 50%;
      font-weight: bold;
      color: #888;
    }

    #Messages {
      height: calc(100vh - 170px);
      overflow: auto;
      border: solid white 1px;
      border: none;
      padding: 0px;
    }

    #SendButton {
      height: 34px;
      width: 34px;
      padding: 0px;
      border-radius: 8px;
      border: none;
      outline-color: white;
      outline-style: solid;
      outline-width: 2px;
      background-color: black;
      color: white;
      font-family: 'Nunito';
      bottom: 6px;
      right: 8px;
      position: fixed;
    }

    #OpenServersButton {
      height: 34px;
      width: 34px;
      border-radius: 800px;
      border: none;
      outline-style: none;
      font-size: larger;
      font-weight: bold;
      outline-color: #fff;
      outline-style: solid;
      outline-width: 1px;
      background-color: black;
      color: white;
      font-family: 'Nunito';
      transform: translateX(10px);
    }

    #SendButton:focus {
      outline-color: blue;
      outline-style: solid;
      outline-width: 2px;
    }

    #SendButton:hover {
      background-color: white;
      color: black;
    }

    #SendButton:active {
      background-color: gray;
      color: black;
    }
    
    #OpenServersButton:focus {
      outline-color: blue;
    }
    
    #OpenServersButton:hover {
      background-color: white;
      color: black;
      outline-color: black;
    }
    
    #OpenServersButton:active {
      background-color: gray;
      color: black;
    }

    #ServerList {
      background-color: #202020;
      border: solid white 1px;
      border-radius: 8px;
      padding: 10px;
      margin-right: 7px;
    }

    .OpenServer {
      height: 24px;
      width: 60px;
      border-radius: 8px;
      border: none;
      outline-color: white;
      outline-style: solid;
      outline-width: 1px;
      background-color: black;
      color: white;
      font-family: 'Nunito';
      margin-left: 7px;
    }

    .OpenServer:focus {
      outline-color: blue;
      outline-style: solid;
      outline-width: 1px;
    }

    .OpenServer:hover {
      background-color: white;
      color: black;
      outline-color: black;
    }

    .OpenServer:active {
      background-color: gray;
      color: black;
    }

    #CreateServerButton {
      height: 24px;
      width: 65px;
      border-radius: 8px;
      border: none;
      outline-color: white;
      outline-style: solid;
      outline-width: 1px;
      background-color: black;
      color: white;
      font-family: 'Nunito';
      margin-left: 7px;
    }

    #CreateServerButton:focus {
      outline-color: blue;
      outline-style: solid;
      outline-width: 1px;
    }

    #CreateServerButton:hover {
      background-color: white;
      color: black;
      outline-color: black;
    }

    #CreateServerButton:active {
      background-color: gray;
      color: black;
    }
  </style>
</head>
<body>
  <div class="CenterVert">
    <span id="ServerName">Server select</span>
  </div>
  <div class="Line"></div>
  <br>
  <div id="ServerList">
    <div class="ServerListServer" id="32d58460-8333-4efe-9f5a-064c273757b6">
      <span>Test Server</span><!--
   --><button class="OpenServer" data-server-id="32d58460-8333-4efe-9f5a-064c273757b6">Open</button>
    </div>
    <br>
    <div id="CreateServer">
      <span>Create Server</span><!--
   --><button class="OpenServer" id="CreateServerButton">Create</button>
    </div>
  </div>
  <script src="./server-select-main.js"></script>
</body>
</html>
